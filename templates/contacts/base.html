
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PulseContacts</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="sidebar">
<h2 class="logo">PulseContacts</h2>

<a href="/"><i class="fas fa-chart-pie"></i> Dashboard</a>
<a href="/add/"><i class="fas fa-user-plus"></i> Add Contact</a>
<a href="/profile/"><i class="fas fa-user"></i> Profile</a>
<a href="/logout/"><i class="fas fa-right-from-bracket"></i> Logout</a>
</div>

<div class="main">

{% if messages %}
{% for message in messages %}
<div class="toast-msg">{{ message }}</div>
{% endfor %}
{% endif %}

{% block content %}{% endblock %}
</div>

</body>
</html>
