
{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="auth-body">

<div class="auth-card floating">
<h1 class="mb-4 text-center">Welcome Back</h1>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="post" class="auth-form">
{% csrf_token %}
<input name="username" class="form-control glass-input mb-3" placeholder="Username">
<input type="password" name="password" class="form-control glass-input mb-3" placeholder="Password">
<button class="btn btn-neon w-100">Login</button>
</form>

<p class="mt-3 text-center">
<a href="/register/">Create Account</a>
</p>
</div>

</body>
</html>
